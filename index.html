<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Link - Avatar</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.bio-container {
    width: 100%;
    max-width: 400px; /* Định dạng khung chuẩn mobile */
    text-align: center;
    padding: 20px;
}

/* Khung viền và hiệu ứng của Avatar */
.avatar-box {
    margin-bottom: 20px;
}

.avatar-box img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #ff9800; /* Viền màu cam nổi bật */
    box-shadow: 0 4px 15px rgba(255, 152, 0, 0.3);
    transition: transform 0.3s ease;
}

.avatar-box img:hover {
    transform: scale(1.05); /* Phóng to nhẹ khi di chuột vào avatar */
}

/* Phần chữ giới thiệu */
.profile-name {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 8px;
}

.profile-desc {
    font-size: 15px;
    color: #bbb;
    margin-bottom: 30px;
}

/* Danh sách nút liên kết */
.links-group {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.bio-btn {
    display: block;
    text-decoration: none;
    background: #ff9800;
    color: white;
    padding: 14px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.2s ease;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
}

.bio-btn:hover {
    background: #e08600;
    transform: translateY(-2px); /* Nút nảy lên nhẹ khi di chuột */
}
</style>
</head>

<body>

<div class="bio-container">

    <!-- Phần Avatar -->
    <div class="avatar-box">
        <img src="https://via.placeholder.com/150" alt="Avatar">
    </div>

    <!-- Thông tin cá nhân -->
    <div class="profile-name">Tên Của Bạn</div>
    <div class="profile-desc">Chào mừng bạn đến với trang liên kết của tôi! 👋</div>

    <!-- Các nút Website -->
    <div class="links-group">
        <a href="https://link1.com" target="_blank" class="bio-btn">Website Chính Thức</a>
        <a href="https://link2.com" target="_blank" class="bio-btn">Facebook Cá Nhân</a>
        <a href="https://link3.com" target="_blank" class="bio-btn">Kênh YouTube</a>
    </div>

</div>

</body>
</html>

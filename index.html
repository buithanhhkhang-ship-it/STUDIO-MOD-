<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thư mục Link</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.folder-box {
    text-align: center;
}

.folder {
    cursor: pointer;
    user-select: none; /* Tránh việc người dùng vô tình bôi đen ảnh khi click nhanh */
}

.folder img {
    width: 150px;
    transition: transform 0.3s ease;
}

.folder img:hover {
    transform: scale(1.08);
}

.desc {
    margin-top: 10px;
    font-size: 18px;
    font-weight: bold;
}

/* Tối ưu hiệu ứng mượt mà bằng max-height và opacity */
.buttons {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    margin-top: 0;
}

/* Khi class 'open' được thêm vào thông qua JS */
.buttons.open {
    max-index: 500px; /* Đủ chỗ cho các nút hiển thị */
    max-height: 300px; 
    opacity: 1;
    margin-top: 20px;
}

.buttons a {
    display: block;
    text-decoration: none;
    background: #ff9800;
    color: white;
    padding: 12px;
    margin: 10px auto;
    width: 200px;
    border-radius: 10px;
    font-weight: bold;
    transition: background 0.2s;
}

.buttons a:hover {
    background: #e08600; /* Hiệu ứng đổi màu nhẹ khi rê chuột vào nút */
}
</style>
</head>

<body>

<div class="folder-box">

    <div class="folder" onclick="toggleFolder()">
        <img src="https://sf-static.upanhlaylink.com/img/image_20260717b13c7f2df9e6171f883e04997caa2d54.jpg" alt="Folder">
    </div>

    <div class="desc">
        📂 MOD SKIN FREE FIRE
    </div>

    <div class="buttons" id="menu">
        <a href="https://link1.com" target="_blank">Link 1</a>
        <a href="https://link2.com" target="_blank">Link 2</a>
    </div>

</div>

<script>
function toggleFolder() {
    let menu = document.getElementById("menu");
    // Sử dụng classList.toggle giúp mã nguồn ngắn gọn và dễ quản lý hiệu ứng CSS hơn
    menu.classList.toggle("open");
}
</script>

</body>
</html>
